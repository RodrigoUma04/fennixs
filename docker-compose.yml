services:
  traefik:
    image: traefik:v3.7
    ports:
      - '${GATEWAY_PORT:-80}:80'
      - '127.0.0.1:8080:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik.yml:/etc/traefik/traefik.yml
    labels:
      - 'traefik.http.middlewares.auth-verify.forwardauth.address=http://auth:8081/auth/verify'
      - 'traefik.http.middlewares.auth-verify.forwardauth.authResponseHeaders=X-User-Id'
    networks:
      - services
    depends_on:
      auth:
        condition: service_healthy
    restart: unless-stopped

  auth:
    image: ghcr.io/rodrigouma04/fennixs-auth:latest
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-false}
      TIMEZONE: ${TIMEZONE:-UTC}
      HEALTH_SHOW_DETAILS: ${HEALTH_SHOW_DETAILS:-never}
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ${LOGGING_STRUCTURED_FORMAT_CONSOLE:-}
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.auth.rule=PathPrefix(`/auth/`)'
      - 'traefik.http.routers.auth.entrypoints=web'
      - 'traefik.http.services.auth.loadbalancer.server.port=8081'
    networks:
      - services
      - db
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8081/actuator/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  core-api:
    image: ghcr.io/rodrigouma04/fennixs-core-api:latest
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      TIMEZONE: ${TIMEZONE:-UTC}
      HEALTH_SHOW_DETAILS: ${HEALTH_SHOW_DETAILS:-never}
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ${LOGGING_STRUCTURED_FORMAT_CONSOLE:-}
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.api.rule=PathPrefix(`/api/`)'
      - 'traefik.http.routers.api.entrypoints=web'
      - 'traefik.http.services.api.loadbalancer.server.port=8082'
      - 'traefik.http.routers.api.middlewares=auth-verify@docker'
    networks:
      - services
      - db
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8082/actuator/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  database:
    image: postgres:18
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - db
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

networks:
  services:
    driver: bridge
  db:
    driver: bridge

volumes:
  postgres_data:
