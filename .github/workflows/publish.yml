name: Publish

on:
  push:
    tags:
      - "backend/core-api-v*"
      - "backend/auth-v*"

jobs:
  publish-core-api:
    if: startsWith(github.ref, 'refs/tags/backend/core-api-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/backend/core-api-v}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: backend/core-api
          push: true
          tags: |
            ghcr.io/rodrigouma04/fennixs-core-api:${{ steps.version.outputs.version }}
            ghcr.io/rodrigouma04/fennixs-core-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-auth:
    if: startsWith(github.ref, 'refs/tags/backend/auth-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/backend/auth-v}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: backend/auth
          push: true
          tags: |
            ghcr.io/rodrigouma04/fennixs-auth:${{ steps.version.outputs.version }}
            ghcr.io/rodrigouma04/fennixs-auth:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
