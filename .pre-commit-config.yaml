repos:
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [yaml, json, json5, markdown]
        exclude: ^backend/

  - repo: local
    hooks:
      - id: spotless
        name: Spotless
        language: system
        entry: bash -c 'cd backend/core-api && ./mvnw spotless:apply && cd ../auth && ./mvnw spotless:apply'
        files: ^backend/.*\.(java|yaml|yml|sql)$
        pass_filenames: false
