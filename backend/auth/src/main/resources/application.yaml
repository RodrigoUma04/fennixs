spring:
  application:
    name: auth

  mvc:
    problemdetails:
      enabled: true

  datasource:
    url: jdbc:postgresql://database:5432/fennixs_auth
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: fennixs-auth-pool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: ${HEALTH_SHOW_DETAILS:never}

logging:
  level:
    root: WARN
    com.fennixs.auth: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  timezone: ${TIMEZONE:UTC}
  registration:
    allow: ${ALLOW_REGISTRATION:false}
