spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fennixsdb
    username: fennixs
    password: ${DB_PASSWORD}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format-sql: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    root: INFO
    com.fennixs.coreapi: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: DEBUG
